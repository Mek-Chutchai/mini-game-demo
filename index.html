<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Seaside Garden — Cozy Scene</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Sniglet:wght@400;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
    <style>
      :root {
        --scene-sky-1: #b6e6f3;
        --scene-sky-2: #79c8e0;
        --scene-sea-1: #3f97c2;
        --scene-sea-2: #2d6d99;
        --scene-grass-1: #b6db7a;
        --scene-grass-2: #8fc05a;
        --scene-grass-3: #6fa746;
        --scene-dirt-1: #d9c79b;
        --scene-dirt-2: #b89e6a;
        --scene-wood-1: #c69566;
        --scene-wood-2: #8b5a36;
        --scene-stone-1: #cdc5b4;
        --scene-stone-2: #9a9079;
        --scene-cream: #fff8ec;
        --scene-ink: #3a2a1f;
        --scene-pink: #ff9fb6;
      }
      html, body, #root { height: 100%; }
      body {
        margin: 0;
        font-family: 'Quicksand', system-ui, sans-serif;
        background: radial-gradient(circle at 30% 20%, #2a3b46 0%, #131a1f 70%);
        color: var(--scene-ink);
        -webkit-font-smoothing: antialiased;
        overscroll-behavior: none;
      }
      .font-display { font-family: 'Sniglet', 'Quicksand', system-ui, sans-serif; letter-spacing: 0.01em; }
      /* gentle motion keyframes */
      @keyframes float-y { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
      @keyframes sway   { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
      @keyframes pulse-soft { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
      @keyframes bob    { 0%,100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-3px) rotate(1deg); } }
      @keyframes ripple { 0%,100% { transform: translateX(0); opacity:.7;} 50% { transform: translateX(6px); opacity:1;} }
      @keyframes blink  { 0%,92%,100% { transform: scaleY(1);} 95% { transform: scaleY(.1);} }
      @keyframes pop-in { 0% { transform: translate(-50%, -100%) scale(.6); opacity:0;} 60% { transform: translate(-50%, -118%) scale(1.08); opacity:1;} 100% { transform: translate(-50%, -112%) scale(1); opacity:1;} }
      @keyframes ring   { 0% { transform: scale(.6); opacity:.0;} 30%{ opacity:.6;} 100% { transform: scale(1.6); opacity:0;} }
      .anim-float { animation: float-y 4.2s ease-in-out infinite; }
      .anim-sway  { animation: sway 5s ease-in-out infinite; transform-origin: 50% 100%; }
      .anim-pulse { animation: pulse-soft 3s ease-in-out infinite; }
      .anim-bob   { animation: bob 3.6s ease-in-out infinite; }
      .anim-ripple{ animation: ripple 6s ease-in-out infinite; }
      .anim-blink { animation: blink 5s ease-in-out infinite; transform-origin: center; }
      @media (prefers-reduced-motion: reduce) {
        .anim-float,.anim-sway,.anim-pulse,.anim-bob,.anim-ripple,.anim-blink { animation: none !important; }
      }
      /* hit-area button reset */
      .obj-btn { background: transparent; border: 0; padding: 0; cursor: pointer; -webkit-tap-highlight-color: transparent; outline: none; }
      .obj-btn:focus-visible .obj-art { filter: drop-shadow(0 0 0 #fff) drop-shadow(0 0 6px #fde68a); }
      .obj-btn .obj-art { transition: transform 180ms cubic-bezier(.2,.8,.2,1), filter 180ms ease; }
      .obj-btn:hover .obj-art { transform: translateY(-2px) scale(1.04); filter: drop-shadow(0 6px 10px rgba(0,0,0,.18)); }
      .obj-btn:active .obj-art { transform: translateY(0) scale(.97); }
      .obj-selected .obj-art { filter: drop-shadow(0 0 0 #fff) drop-shadow(0 0 10px #ffe27a) drop-shadow(0 6px 8px rgba(0,0,0,.2)); }
      .select-ring { position:absolute; inset:-12%; border-radius:50%; pointer-events:none;
        background: radial-gradient(closest-side, rgba(255,237,140,.55), rgba(255,237,140,0) 70%); animation: ring 1.6s ease-out infinite; }
      /* speech bubble */
      .bubble {
        background: var(--scene-cream);
        color: var(--scene-ink);
        border: 2.5px solid var(--scene-ink);
        border-radius: 14px;
        padding: 6px 10px;
        font-weight: 700;
        font-size: 12px;
        line-height: 1.15;
        white-space: nowrap;
        box-shadow: 0 3px 0 rgba(58,42,31,.25);
        position: relative;
      }
      .bubble::after {
        content: "";
        position: absolute;
        left: 50%; bottom: -8px;
        width: 12px; height: 12px;
        background: var(--scene-cream);
        border-right: 2.5px solid var(--scene-ink);
        border-bottom: 2.5px solid var(--scene-ink);
        transform: translateX(-50%) rotate(45deg);
      }
      .bubble-pop { animation: pop-in 260ms cubic-bezier(.2,.9,.2,1.2) both; }
      /* glass overlay */
      .glass {
        background: rgba(255, 248, 236, 0.72);
        backdrop-filter: blur(10px) saturate(120%);
        -webkit-backdrop-filter: blur(10px) saturate(120%);
        border: 1.5px solid rgba(58,42,31,.18);
      }
      /* subtle paper grain over the whole scene */
      .grain::after {
        content: ""; position:absolute; inset:0; pointer-events:none; mix-blend-mode: multiply; opacity:.08;
        background-image: radial-gradient(rgba(58,42,31,.6) 1px, transparent 1px);
        background-size: 3px 3px;
      }
      /* generic outline-stroke for SVGs */
      .ink-stroke { stroke: var(--scene-ink); stroke-linejoin: round; stroke-linecap: round; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" data-presets="env,react" src="sceneObjects.jsx"></script>
    <script type="text/babel" data-presets="env,react" src="SceneArt.jsx"></script>
    <script type="text/babel" data-presets="env,react" src="SceneObject.jsx"></script>
    <script type="text/babel" data-presets="env,react" src="CozyGameScene.jsx"></script>
    <script type="text/babel" data-presets="env,react" src="app.jsx"></script>
  </body>
</html>
